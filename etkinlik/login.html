<!DOCTYPE html>
<html>
<body>

<h2>Etkinlik Giriş</h2>

<input id="token" placeholder="Token">
<button onclick="login()">Giriş</button>

<script>

let users = [
{token:"abc123", used:false},
{token:"xyz456", used:false},
{token:"test789", used:false}
]

function login(){

let token=document.getElementById("token").value

let user=users.find(u=>u.token===token)

if(!user){
alert("Token yanlış")
return
}

if(user.used){
alert("Bu token zaten kullanılmış")
return
}

localStorage.setItem("token",token)

window.location="scan.html"

}

</script>

</body>
</html>
